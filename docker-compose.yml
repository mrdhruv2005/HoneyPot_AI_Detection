version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: scam_intel_redis
    ports:
      - "6379:6379"
    restart: always

  mongodb:
    image: mongo:latest
    container_name: scam_intel_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
